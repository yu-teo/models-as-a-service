site_name: ODH Models-as-a-Service Documentation
site_url: https://opendatahub-io.github.io/models-as-a-service
repo_url: https://github.com/opendatahub-io/models-as-a-service
repo_name: opendatahub-io/models-as-a-service

# Set the docs directory to the content subdirectory
docs_dir: content

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.boost
    - navigation.instant
  palette:
    - scheme: slate
      primary: white
      accent: blue
      background: '#0d1117'
      surface: '#161b22'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      background: '#ffffff'
      surface: '#f6f8fa'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - swagger-ui-tag:
      docExpansion: list
      tryItOutEnabled: true
  - search:
      lang: en
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Home:
    - index.md
    - Release Notes: release-notes/index.md
    - Migration:
      - Tier to Subscription: migration/tier-to-subscription.md
      - Upgrade to 3.4: migration/upgrade-to-3.4.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Personas: concepts/personas.md
    - Access and Quota Overview: concepts/subscription-overview.md
    - Model Reference: concepts/model-reference.md
    - Authentication Modes: concepts/auth-modes.md
    - API Key Authentication: concepts/api-key-authentication.md
    - Model Access Control: concepts/model-access-control.md
  - Install:
    - Quick Start: quickstart.md
    - Prerequisites:
      - Overview: install/prerequisites.md
      - Operator Setup: install/platform-setup.md
    - Installation:
      - Models-as-a-Service: install/maas-setup.md
      - Model Setup: install/model-setup.md
      - External Model Setup (Tech Preview): install/external-model-setup.md
      - Validation: install/validation.md
      - Multi-Tenant Setup: install/multi-tenant-setup.md
      - Multi-Tenant Validation: install/multi-tenant-validation.md
      - Troubleshooting: install/troubleshooting.md
  - Administration Guide:
    - Configuration & Management:
      - Quota and Access Configuration: configuration-and-management/quota-and-access-configuration.md
      - API Key Administration: configuration-and-management/api-key-administration.md
      - Infrastructure Namespace Separation: configuration-and-management/infra-namespace-migration.md
      - Namespace User Permissions (RBAC): configuration-and-management/namespace-rbac.md
      - Tenant RBAC: configuration-and-management/tenant-rbac.md
      - Troubleshooting ExternalModel RBAC: configuration-and-management/troubleshooting-external-model-rbac.md
      - TLS Configuration: configuration-and-management/tls-configuration.md
      - Gateway Patterns: configuration-and-management/gateway-patterns.md
    - Models:
      - Model Setup: configuration-and-management/model-setup.md
      - Model Listing Flow: configuration-and-management/model-listing-flow.md
    - Advanced Administration:
      - Subscription Cardinality: advanced-administration/subscription-cardinality.md
      - Limitador Persistence: advanced-administration/limitador-persistence.md
      - Authorino Caching: configuration-and-management/authorino-caching.md
      - External OIDC: advanced-administration/external-oidc.md
  - Observability:
    - Overview: observability/index.md
    - Setup: observability/setup.md
    - Metrics & Dashboards: observability/metrics-and-dashboards.md
    - Operations: observability/operations.md
  - User Guide:
    - API Key Management: user-guide/api-key-management.md
    - Model Discovery: user-guide/model-discovery.md
    - Inference: user-guide/inference.md
  - Developer Guide:
    - Controller Architecture: architecture-internals/controller-architecture.md
    - Reconciliation Flow: architecture-internals/reconciliation-flow.md
    - Authentication Internals: architecture-internals/authentication-internals.md
    - Contributing:
      - MaaS Testing and Contribution Guide: contributing/testing-guide.md
      - Release Strategy: contributing/release-strategy.md
  - API Reference:
    - MaaS API Overview: reference/maas-api-overview.md
    - MaaS API (Swagger): reference/api-reference.md
    - MaaS CRDs:
      - MaaSModelRef: reference/crds/maas-model-ref.md
      - ExternalModel: reference/crds/external-model.md
      - MaaSAuthPolicy: reference/crds/maas-auth-policy.md
      - MaaSSubscription: reference/crds/maas-subscription.md
      - AITenant: reference/crds/ai-tenant.md
      - Tenant: reference/crds/tenant.md

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      clickable_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
