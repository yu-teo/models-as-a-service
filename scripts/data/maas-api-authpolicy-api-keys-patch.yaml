spec:
  rules:
    authentication:
      api-keys:
        when:
          - predicate: request.headers.authorization.startsWith("Bearer sk-oai-")
        plain:
          selector: request.headers.authorization
        priority: 0
      openshift-identities:
        when:
          - predicate: '!request.headers.authorization.startsWith("Bearer sk-oai-")'
        priority: 1
    metadata:
      apiKeyValidation:
        when:
          - predicate: request.headers.authorization.startsWith("Bearer sk-oai-")
        http:
          url: https://maas-api.__MAAS_NAMESPACE__.svc.cluster.local:8443/internal/v1/api-keys/validate
          method: POST
          contentType: application/json
          body:
            expression: '{"key": request.headers.authorization.replace("Bearer ", "")}'
        priority: 0
    authorization:
      api-key-valid:
        when:
          - predicate: request.headers.authorization.startsWith("Bearer sk-oai-")
        patternMatching:
          patterns:
            - selector: auth.metadata.apiKeyValidation.valid
              operator: eq
              value: "true"
        priority: 0
    response:
      success:
        headers:
          X-MaaS-Username:
            when:
              - predicate: request.headers.authorization.startsWith("Bearer sk-oai-")
            plain:
              selector: auth.metadata.apiKeyValidation.username
            priority: 0
          X-MaaS-Username-OC:
            when:
              - predicate: '!request.headers.authorization.startsWith("Bearer sk-oai-")'
            plain:
              selector: auth.identity.user.username
            key: X-MaaS-Username
            priority: 1
          X-MaaS-Group:
            when:
              - predicate: request.headers.authorization.startsWith("Bearer sk-oai-")
            plain:
              expression: >-
                '["' + auth.metadata.apiKeyValidation.groups.join('","') + '"]'
            priority: 0
          X-MaaS-Group-OC:
            when:
              - predicate: '!request.headers.authorization.startsWith("Bearer sk-oai-")'
            plain:
              expression: >-
                '["' + auth.identity.user.groups.join('","') + '"]'
            key: X-MaaS-Group
            priority: 1
