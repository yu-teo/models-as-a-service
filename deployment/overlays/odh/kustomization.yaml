apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-odh-overlay

# ODH operator overlay
# This overlay configures MaaS for deployment via OpenDataHub operator
# Includes: maas-api with TLS, maas-controller (gateway policies managed separately)
#
# STRUCTURE:
# - Base resources: maas-api with TLS, maas-controller
# - Shared config: Inherits common patches/replacements via shared-patches component
# - ODH-specific: Additional replacements for DestinationRule
#
# SHARED CONFIGURATION (from components/shared-patches):
# - Environment variables for maas-api deployment (maas-parameters from params.env)
# - Image replacements for maas-api and maas-controller
# - Gateway configuration (namespace, name)
# - AuthPolicy URL placeholder replacement (placehold → actual namespace)
#
# ODH-SPECIFIC CONFIGURATION:
# - DestinationRule for TLS backend configuration
# - Note: Gateway-level policies (gateway-default-auth, gateway-default-deny) 
#   are deployed separately to avoid WasmPlugin timeout issues
#
# For details, see: deployment/components/shared-patches/README.md

# IMPORTANT: This namespace must match 'app-namespace' in params.env
# The AuthPolicy URL uses app-namespace for DNS resolution
namespace: opendatahub

# maas-parameters ConfigMap (same directory as params.env — required for Kustomize load
# restrictions and for Open Data Hub operator ApplyParams on overlays/odh/params.env).
configMapGenerator:
- envs:
  - params.env
  name: maas-parameters
generatorOptions:
  disableNameSuffixHash: true

resources:
  - ../../base/maas-api/overlays/tls  # maas-api with TLS (includes DestinationRule + NetworkPolicy)
  - ../../base/maas-controller/default
  - ../../base/payload-processing/default  # BBR ext_proc for external model payload processing

# Include shared-patches component for common configuration
# This provides: env vars, image replacements, gateway config, URL placeholder fix
components:
  - ../../components/shared-patches

# ODH-SPECIFIC PATCHES
# Additional cache TTL configuration for maas-controller
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: maas-controller
    spec:
      template:
        spec:
          containers:
          - name: manager
            args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --gateway-name=$(GATEWAY_NAME)
            - --gateway-namespace=$(GATEWAY_NAMESPACE)
            - --maas-api-namespace=$(MAAS_API_NAMESPACE)
            - --maas-subscription-namespace=$(MAAS_SUBSCRIPTION_NAMESPACE)
            - --metadata-cache-ttl=$(METADATA_CACHE_TTL)
            - --authz-cache-ttl=$(AUTHZ_CACHE_TTL)
            env:
            - name: METADATA_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  key: metadata-cache-ttl
                  name: maas-parameters
                  optional: false
            - name: AUTHZ_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  key: authz-cache-ttl
                  name: maas-parameters
                  optional: false
  target:
    kind: Deployment
    name: maas-controller

# ODH-SPECIFIC REPLACEMENTS
# These are in addition to shared-patches and handle ODH-specific resources
# (gateway policies and DestinationRule)
replacements:
# Payload-processing image replacement
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.payload-processing-image
  targets:
  - select:
      kind: Deployment
      name: payload-processing
    fieldPaths:
    - spec.template.spec.containers.[name=payload-processing].image
# Payload-processing replicas (configurable for large-scale deployments)
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.payload-processing-replicas
  targets:
  - select:
      kind: Deployment
      name: payload-processing
    fieldPaths:
    - spec.replicas
# Payload-processing resources must be in the gateway namespace
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: Deployment
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: Service
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ServiceAccount
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: EnvoyFilter
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: DestinationRule
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ConfigMap
      name: payload-processing-plugins
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ClusterRoleBinding
      name: payload-processing-reader
    fieldPaths:
    - subjects.0.namespace
# Payload-processing EnvoyFilter must target the correct gateway name
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-name
  targets:
  - select:
      kind: EnvoyFilter
      name: payload-processing
    fieldPaths:
    - spec.targetRefs.0.name
# Replace namespace in payload-processing DestinationRule host and EnvoyFilter cluster_name.
# Kustomize default: openshift-ingress (gateway ns, where payload-processing is deployed).
# RHOAI operator overrides to app namespace (its NamespaceApplierPlugin moves all
# resources to the app ns, so the FQDN must match). See RHOAIENG-59726.
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.payload-processing-namespace
  targets:
  - select:
      kind: DestinationRule
      name: payload-processing
    fieldPaths:
    - spec.host
    options:
      delimiter: "."
      index: 1
  - select:
      kind: EnvoyFilter
      name: payload-processing
    fieldPaths:
    - spec.configPatches.0.patch.value.typed_config.grpc_service.envoy_grpc.cluster_name
    options:
      delimiter: "."
      index: 1
# Replace gateway namespace in DestinationRule 
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - metadata.namespace

# Replace app-namespace in DestinationRule host
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.app-namespace
  targets:
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - spec.host
    options:
      delimiter: "."
      index: 1
  - select:
      kind: ClusterRoleBinding
      name: maas-controller-rolebinding
    fieldPaths:
    - subjects.0.namespace
  - select:
      kind: ClusterRoleBinding
      name: maas-api-supplemental
    fieldPaths:
    - subjects.0.namespace
  - select:
      kind: RoleBinding
      name: maas-controller-leader-election-rolebinding
    fieldPaths:
    - subjects.0.namespace
