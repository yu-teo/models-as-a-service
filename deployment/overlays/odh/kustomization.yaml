apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-odh-overlay

# ODH operator overlay
# This overlay configures MaaS for deployment via OpenDataHub operator
# Includes: maas-api with TLS, maas-controller, and gateway-level default policies
#
# STRUCTURE:
# - Base resources: maas-api with TLS, maas-controller, gateway policies
# - Shared config: Inherits common patches/replacements via shared-patches component
# - ODH-specific: Additional replacements for gateway policies and DestinationRule
#
# SHARED CONFIGURATION (from components/shared-patches):
# - ConfigMap with parameters (images, gateway, namespace)
# - Environment variables for maas-api deployment
# - Image replacements for maas-api and maas-controller
# - Gateway configuration (namespace, name)
# - AuthPolicy URL placeholder replacement (placehold → actual namespace)
#
# ODH-SPECIFIC CONFIGURATION:
# - Gateway-level policies (gateway-default-auth, gateway-default-deny)
# - DestinationRule for TLS backend configuration
#
# For details, see: deployment/components/shared-patches/README.md

# IMPORTANT: This namespace must match 'app-namespace' in params.env
# The AuthPolicy URL uses app-namespace for DNS resolution
namespace: opendatahub

resources:
  - ../../base/maas-api/overlays/tls  # maas-api with TLS (includes DestinationRule + NetworkPolicy)
  - ../../base/maas-controller/default
  - ../../base/maas-controller/policies  # gateway-default-auth, gateway-default-deny

# Include shared-patches component for common configuration
# This provides: ConfigMap, env vars, image replacements, gateway config, URL placeholder fix
components:
  - ../../components/shared-patches

# ODH-SPECIFIC PATCHES
# Additional cache TTL configuration for maas-controller
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: maas-controller
    spec:
      template:
        spec:
          containers:
          - name: manager
            args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --gateway-name=$(GATEWAY_NAME)
            - --gateway-namespace=$(GATEWAY_NAMESPACE)
            - --maas-api-namespace=$(MAAS_API_NAMESPACE)
            - --maas-subscription-namespace=$(MAAS_SUBSCRIPTION_NAMESPACE)
            - --cluster-audience=$(CLUSTER_AUDIENCE)
            - --metadata-cache-ttl=$(METADATA_CACHE_TTL)
            - --authz-cache-ttl=$(AUTHZ_CACHE_TTL)
            env:
            - name: METADATA_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  key: metadata-cache-ttl
                  name: maas-parameters
                  optional: false
            - name: AUTHZ_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  key: authz-cache-ttl
                  name: maas-parameters
                  optional: false
  target:
    kind: Deployment
    name: maas-controller

# ODH-SPECIFIC REPLACEMENTS
# These are in addition to shared-patches and handle ODH-specific resources
# (gateway policies and DestinationRule)
replacements:
# Replace gateway namespace in gateway policies
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: AuthPolicy
      name: gateway-default-auth
    fieldPaths:
    - metadata.namespace
  - select:
      kind: TokenRateLimitPolicy
      name: gateway-default-deny
    fieldPaths:
    - metadata.namespace
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - metadata.namespace

# Replace app-namespace in DestinationRule host
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.app-namespace
  targets:
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - spec.host
    options:
      delimiter: "."
      index: 1
  - select:
      kind: ClusterRoleBinding
      name: maas-controller-rolebinding
    fieldPaths:
    - subjects.0.namespace
  - select:
      kind: RoleBinding
      name: maas-controller-leader-election-rolebinding
    fieldPaths:
    - subjects.0.namespace
