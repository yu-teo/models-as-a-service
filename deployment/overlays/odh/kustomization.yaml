apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-odh-overlay

# ODH overlay: maas-api with TLS + maas-controller (per-route auth/rate limits)
# For full deployment including rate limits, use openshift overlay

namespace: opendatahub
resources:
  - ../../base/maas-api/overlays/tls  # maas-api with TLS (includes DestinationRule + NetworkPolicy)
  - ../../base/maas-controller/default
  - ../../base/maas-controller/policies  # gateway-default-auth, gateway-default-deny

configMapGenerator:
- envs:
  - params.env
  name: maas-parameters
generatorOptions:
  disableNameSuffixHash: true

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: maas-api
    spec:
      template:
        spec:
          containers:
          - name: maas-api
            env:
            - name: GATEWAY_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  key: gateway-namespace
                  name: maas-parameters
            - name: GATEWAY_NAME
              valueFrom:
                configMapKeyRef:
                  key: gateway-name
                  name: maas-parameters
            - name: API_KEY_MAX_EXPIRATION_DAYS
              valueFrom:
                configMapKeyRef:
                  key: api-key-max-expiration-days
                  name: maas-parameters
                  optional: true
  target:
    kind: Deployment
    name: maas-api
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: maas-controller
    spec:
      template:
        spec:
          containers:
          - name: manager
            args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --gateway-name=$(GATEWAY_NAME)
            - --gateway-namespace=$(GATEWAY_NAMESPACE)
            - --maas-api-namespace=$(MAAS_API_NAMESPACE)
            - --maas-subscription-namespace=$(MAAS_SUBSCRIPTION_NAMESPACE)
            - --cluster-audience=$(CLUSTER_AUDIENCE)
            - --metadata-cache-ttl=$(METADATA_CACHE_TTL)
            - --authz-cache-ttl=$(AUTHZ_CACHE_TTL)
            env:
            - name: METADATA_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  key: metadata-cache-ttl
                  name: maas-parameters
                  optional: false
            - name: AUTHZ_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  key: authz-cache-ttl
                  name: maas-parameters
                  optional: false
  target:
    kind: Deployment
    name: maas-controller

replacements:
# Gateway policies must be in openshift-ingress to target maas-default-gateway
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: AuthPolicy
      name: gateway-default-auth
    fieldPaths:
    - metadata.namespace
  - select:
      kind: TokenRateLimitPolicy
      name: gateway-default-deny
    fieldPaths:
    - metadata.namespace
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.maas-api-image
  targets:
  - select:
      kind: Deployment
      name: maas-api
    fieldPaths:
    - spec.template.spec.containers.[name=maas-api].image
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.maas-controller-image
  targets:
  - select:
      kind: Deployment
      name: maas-controller
    fieldPaths:
    - spec.template.spec.containers.[name=manager].image
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: HTTPRoute
      name: maas-api-route
    fieldPaths:
    - spec.parentRefs.0.namespace
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - metadata.namespace
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-name
  targets:
  - select:
      kind: HTTPRoute
      name: maas-api-route
    fieldPaths:
    - spec.parentRefs.0.name
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.app-namespace
  targets:
  - select:
      kind: AuthPolicy
      name: maas-api-auth-policy
    fieldPaths:
    - spec.rules.metadata.apiKeyValidation.http.url
    options:
      delimiter: "."
      index: 1
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - spec.host
    options:
      delimiter: "."
      index: 1
  - select:
      kind: ClusterRoleBinding
      name: maas-controller-rolebinding
    fieldPaths:
    - subjects.0.namespace
  - select:
      kind: RoleBinding
      name: maas-controller-leader-election-rolebinding
    fieldPaths:
    - subjects.0.namespace
