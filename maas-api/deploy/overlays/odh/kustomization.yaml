apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-api-opendatahub

# Overlay used by the Tenant reconciler (maas-controller) to render maas-api
# platform workloads. CustomizeParams writes gateway, namespace, and audience
# values into params.env before kustomize build; shared-patches then
# substitutes them into Deployments, HTTPRoutes, and AuthPolicies.
resources:
- ../../../../deployment/base/maas-api/overlays/tls
- ../../../../deployment/base/maas-controller/policies
- ../../../../deployment/base/payload-processing/default
- ../../../../deployment/components/observability/observability/dashboards

namespace: opendatahub

labels:
- pairs:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api

components:
  - ../../../../deployment/components/shared-patches

configMapGenerator:
- name: maas-parameters
  envs:
    - params.env
  options:
    disableNameSuffixHash: true

generatorOptions:
  disableNameSuffixHash: true

# DestinationRule must live in the gateway namespace, not app namespace.
# The overlay's `namespace:` directive overrides all resources to opendatahub,
# so we fix it here (replacements run after namespace transformer).
replacements:
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - metadata.namespace

# --- payload-processing replacements ---
# Image
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.payload-processing-image
  targets:
  - select:
      kind: Deployment
      name: payload-processing
    fieldPaths:
    - spec.template.spec.containers.[name=payload-processing].image
# Replicas
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.payload-processing-replicas
  targets:
  - select:
      kind: Deployment
      name: payload-processing
    fieldPaths:
    - spec.replicas
# Payload-processing resources must be in the gateway namespace
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: Deployment
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: Service
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ServiceAccount
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: EnvoyFilter
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: DestinationRule
      name: payload-processing
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ConfigMap
      name: payload-processing-plugins
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ClusterRoleBinding
      name: payload-processing-reader
    fieldPaths:
    - subjects.0.namespace
# EnvoyFilter must target the correct gateway name
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-name
  targets:
  - select:
      kind: EnvoyFilter
      name: payload-processing
    fieldPaths:
    - spec.targetRefs.0.name
# Replace namespace in payload-processing DestinationRule host and EnvoyFilter cluster_name.
# Kustomize default: openshift-ingress (gateway ns). RHOAI operator overrides to app ns.
# See RHOAIENG-59726.
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.payload-processing-namespace
  targets:
  - select:
      kind: DestinationRule
      name: payload-processing
    fieldPaths:
    - spec.host
    options:
      delimiter: "."
      index: 1
  - select:
      kind: EnvoyFilter
      name: payload-processing
    fieldPaths:
    - spec.configPatches.0.patch.value.typed_config.grpc_service.envoy_grpc.cluster_name
    options:
      delimiter: "."
      index: 1
